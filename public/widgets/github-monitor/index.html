<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub PR Monitor</title>
  <script src="/widget-sdk.js"></script>
  <style>
    body {
      margin: 0; padding: 16px; height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
      background: rgba(0, 0, 0, 0.2);
      color: rgba(255,255,255,0.9);
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .header { font-size: 0.9rem; font-weight: 600; letter-spacing: 0.5px; color: #10b981; margin-bottom: 12px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; }
    .repo-selector { display: flex; align-items: center; gap: 4px; overflow: hidden; }
    .repo-nav { cursor: pointer; color: rgba(255,255,255,0.4); padding: 0 4px; user-select: none; transition: color 0.2s; }
    .repo-nav:hover { color: #10b981; }
    .repo-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; color: #a7f3d0; text-align: center; }
    .pr-count { background: rgba(16, 185, 129, 0.2); padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; color: #34d399; }
    .pr-list { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex-grow: 1; padding-right: 4px; }
    .pr-list::-webkit-scrollbar { width: 4px; }
    .pr-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    .pr-item {
      background: rgba(255,255,255,0.06);
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .pr-item:hover { background: rgba(255,255,255,0.12); border-left-color: #10b981; transform: translateX(2px); }
    .pr-title { font-size: 0.9rem; font-weight: 500; letter-spacing: 0.3px; line-height: 1.4; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .pr-number { color: #60a5fa; margin-right: 6px; }
    .pr-meta { font-size: 0.75rem; color: rgba(255,255,255,0.5); display: flex; justify-content: space-between; align-items: center; }
    .pr-author { font-weight: 500; color: rgba(255,255,255,0.8); display: flex; align-items: center; gap: 6px; }
    .avatar { width: 16px; height: 16px; border-radius: 50%; }
    .labels { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
    .label { font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; font-weight: 600; color: #fff; }
    .status { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-align: center; margin-top: 10px; flex-shrink: 0; }
    .icon { margin-right: 6px; font-weight: bold; font-size: 1.1rem; }
    .btn-settings { cursor: pointer; color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-left: 8px; transition: color 0.2s; }
    .btn-settings:hover { color: #fff; }
    
    /* Config Panel */
    .config-panel { display: none; flex-direction: column; gap: 12px; height: 100%; }
    .config-panel.active { display: flex; }
    .input-row { display: flex; gap: 6px; }
    .input-field { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; outline: none; }
    .input-field:focus { border-color: #10b981; }
    .btn-save { background: #10b981; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    .btn-save:hover { background: #059669; }
    .repo-list-mgr { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
    .repo-mgr-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 6px 10px; border-radius: 6px; font-size: 0.8rem; }
    .btn-del { color: #ef4444; cursor: pointer; font-weight: bold; padding: 0 4px; }
    .btn-del:hover { color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <div class="repo-selector">
      <span class="icon">⑃</span>
      <span class="repo-nav" onclick="prevRepo()" id="nav-prev">◀</span>
      <span class="repo-name" id="repo-title">Loading...</span>
      <span class="repo-nav" onclick="nextRepo()" id="nav-next">▶</span>
      <span class="btn-settings" onclick="toggleConfig()">⚙️</span>
    </div>
    <span class="pr-count" id="pr-count">--</span>
  </div>

  <div class="config-panel" id="config-panel">
    <div style="font-size:0.8rem; font-weight:bold; display: flex; justify-content: space-between;">
      <span>管理监控仓库</span>
      <span class="btn-settings" onclick="toggleConfig()">关闭</span>
    </div>
    <div class="input-row">
      <input type="text" id="repo-input" class="input-field" placeholder="Owner/Repo" onkeydown="if(event.key === 'Enter') addRepo()" />
      <button class="btn-save" onclick="addRepo()">添加</button>
    </div>
    <div class="input-row" style="margin-top: -4px;">
      <input type="password" id="token-input" class="input-field" placeholder="GitHub Token (可选,防限流)" onkeydown="if(event.key === 'Enter') saveToken()" />
      <button class="btn-save" onclick="saveToken()">保存 Token</button>
    </div>
    <div class="repo-list-mgr" id="repo-list-mgr"></div>
  </div>

  <div class="pr-list" id="pr-list">
    <div class="status" style="margin-top:40px;">Fetching Pull Requests...</div>
  </div>
  <div class="status" id="last-update" style="margin-top:auto;">Updated --:--</div>

  <script>
    let repos = ['linuxdeepin/dde-control-center'];
    let currentIdx = 0;
    let githubToken = '';
    
    const urlParams = new URLSearchParams(window.location.search);
    const instanceId = urlParams.get('instanceId') || 'github_default';
    const configFilename = `${instanceId}_config.json`;
    
    function timeAgo(dateString) {
      const date = new Date(dateString);
      const seconds = Math.floor((new Date() - date) / 1000);
      let interval = seconds / 86400;
      if (interval > 1) return Math.floor(interval) + "d ago";
      interval = seconds / 3600;
      if (interval > 1) return Math.floor(interval) + "h ago";
      interval = seconds / 60;
      if (interval > 1) return Math.floor(interval) + "m ago";
      return "just now";
    }

    function getContrastYIQ(hexcolor){
      const r = parseInt(hexcolor.substring(0,2),16);
      const g = parseInt(hexcolor.substring(2,4),16);
      const b = parseInt(hexcolor.substring(4,6),16);
      const yiq = ((r*299)+(g*587)+(b*114))/1000;
      return (yiq >= 128) ? 'black' : 'white';
    }

    async function fetchPRs() {
      if (repos.length === 0) {
        document.getElementById('repo-title').innerText = '未配置仓库';
        document.getElementById('pr-list').innerHTML = '<div class="status" style="margin-top:40px;">请点击⚙️添加监控仓库</div>';
        document.getElementById('pr-count').innerText = '0 Open';
        return;
      }
      
      const currentRepo = repos[currentIdx];
      document.getElementById('repo-title').innerText = currentRepo.split('/').pop() || currentRepo;
      
      document.getElementById('nav-prev').style.visibility = repos.length > 1 ? 'visible' : 'hidden';
      document.getElementById('nav-next').style.visibility = repos.length > 1 ? 'visible' : 'hidden';

      const listEl = document.getElementById('pr-list');
      try {
        // 请求参数改为 sort=created 保证最新的 PR 优先展示
        const res = await window.__widgetBridge.invoke('fetch_proxy', { 
          url: `https://api.github.com/repos/${currentRepo}/pulls?state=open&sort=created&direction=desc&per_page=10`,
          token: githubToken || null
        });
        const prs = JSON.parse(res);
        
        if (!Array.isArray(prs)) {
          if (prs.message) throw new Error(prs.message);
          throw new Error('Invalid data');
        }

        document.getElementById('pr-count').innerText = prs.length + (prs.length === 10 ? '+' : ' Open');
        
        listEl.innerHTML = '';
        if (prs.length === 0) {
          listEl.innerHTML = '<div class="status" style="margin-top:40px;">No pending PRs 🎉</div>';
        } else {
          prs.forEach(pr => {
            const item = document.createElement('div');
            item.className = 'pr-item';
            item.onclick = () => window.__widgetBridge.invoke('open_url', { url: pr.html_url });
            
            const title = document.createElement('div');
            title.className = 'pr-title';
            title.innerHTML = `<span class="pr-number">#${pr.number}</span>${pr.title}`;
            
            const labelsDiv = document.createElement('div');
            labelsDiv.className = 'labels';
            if (pr.labels && pr.labels.length > 0) {
                pr.labels.slice(0, 3).forEach(label => {
                    const l = document.createElement('span');
                    l.className = 'label';
                    l.style.backgroundColor = `#${label.color}`;
                    l.style.color = getContrastYIQ(label.color);
                    l.innerText = label.name;
                    labelsDiv.appendChild(l);
                });
            }

            const meta = document.createElement('div');
            meta.className = 'pr-meta';
            meta.innerHTML = `
              <span class="pr-author">
                <img class="avatar" src="${pr.user.avatar_url}" />
                ${pr.user.login}
              </span>
              <span>${timeAgo(pr.created_at)}</span>
            `;
            
            item.appendChild(title);
            if (pr.labels && pr.labels.length > 0) item.appendChild(labelsDiv);
            item.appendChild(meta);
            listEl.appendChild(item);
          });
        }
        
        const now = new Date();
        document.getElementById('last-update').innerText = `Updated ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      } catch (e) {
        let msg = e.message || String(e);
        if (msg.toLowerCase().includes("rate limit")) {
          listEl.innerHTML = `
            <div class="status" style="color:#ef4444; margin-top:30px; line-height: 1.6;">
              <div style="font-weight:bold; margin-bottom:8px;">⚠️ 请求已达公共接口上限</div>
              <span style="color:#34d399; cursor:pointer; text-decoration:underline;" onclick="toggleConfig()">
                点击此处配置 GitHub Token 解除限制
              </span>
            </div>
          `;
        } else {
          listEl.innerHTML = `<div class="status" style="color:#ef4444; margin-top:40px;">获取失败: ${msg}</div>`;
        }
      }
    }

    async function loadConfig() {
      try {
        const data = await window.__widgetBridge.invoke('widget_read_file', { filename: configFilename });
        if (data) {
          const cfg = JSON.parse(data);
          if (cfg.repos && Array.isArray(cfg.repos)) {
            repos = cfg.repos;
            currentIdx = cfg.currentIdx !== undefined ? cfg.currentIdx : 0;
            if (currentIdx >= repos.length) currentIdx = 0;
          }
          if (cfg.token) {
            githubToken = cfg.token;
            document.getElementById('token-input').value = githubToken;
          }
        }
      } catch (e) {}
      fetchPRs();
    }

    async function saveConfig() {
      await window.__widgetBridge.invoke('widget_write_file', { 
        filename: configFilename, 
        content: JSON.stringify({ repos, currentIdx, token: githubToken }) 
      });
      fetchPRs();
    }

    function saveToken() {
      const val = document.getElementById('token-input').value.trim();
      githubToken = val;
      saveConfig();
      // 如果之前是因为限流报错，保存 Token 后立刻清空状态重新拉取
      document.getElementById('pr-list').innerHTML = '<div class="status" style="margin-top:40px;">Fetching Pull Requests...</div>';
    }

    function addRepo() {
      const newVal = document.getElementById('repo-input').value.trim();
      if (newVal && !repos.includes(newVal)) {
        repos.push(newVal);
        document.getElementById('repo-input').value = '';
        renderConfigMgr();
        saveConfig();
      }
    }

    function removeRepo(idx) {
      repos.splice(idx, 1);
      if (currentIdx >= repos.length) currentIdx = Math.max(0, repos.length - 1);
      renderConfigMgr();
      saveConfig();
    }

    function prevRepo() {
      if (repos.length <= 1) return;
      currentIdx = (currentIdx - 1 + repos.length) % repos.length;
      saveConfig();
    }

    function nextRepo() {
      if (repos.length <= 1) return;
      currentIdx = (currentIdx + 1) % repos.length;
      saveConfig();
    }

    function renderConfigMgr() {
      const mgr = document.getElementById('repo-list-mgr');
      mgr.innerHTML = '';
      repos.forEach((r, idx) => {
        const item = document.createElement('div');
        item.className = 'repo-mgr-item';
        item.innerHTML = `<span>${r}</span> <span class="btn-del" onclick="removeRepo(${idx})">×</span>`;
        mgr.appendChild(item);
      });
    }

    function toggleConfig() {
      const panel = document.getElementById('config-panel');
      const list = document.getElementById('pr-list');
      if (panel.classList.contains('active')) {
        panel.classList.remove('active');
        list.style.display = 'flex';
        document.getElementById('last-update').style.display = 'block';
      } else {
        panel.classList.add('active');
        list.style.display = 'none';
        document.getElementById('last-update').style.display = 'none';
        renderConfigMgr();
      }
    }

    loadConfig();
    setInterval(fetchPRs, 5 * 60 * 1000);
  </script>
</body>
</html>
