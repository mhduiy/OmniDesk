<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Habit Tracker</title>
  <script src="/widget-sdk.js"></script>
  <style>
    body {
      margin: 0; padding: 16px; height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
      background: rgba(0, 0, 0, 0.15);
      color: rgba(255,255,255,0.9);
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    .title { font-size: 0.8rem; font-weight: 600; margin-bottom: 12px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      flex-grow: 1;
    }
    .dot {
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .dot.active {
      background: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }
  </style>
</head>
<body>
  <div class="title">🏃 运动打卡</div>
  <div class="grid" id="grid"></div>

  <script>
    const grid = document.getElementById('grid');
    const TOTAL_DAYS = 14; // 2 weeks
    let habits = new Array(TOTAL_DAYS).fill(false);

    const urlParams = new URLSearchParams(window.location.search);
    const instanceId = urlParams.get('instanceId') || 'habit_default';
    const filename = `${instanceId}.json`;

    async function loadData() {
      try {
        const data = await window.__widgetBridge.invoke('widget_read_file', { filename });
        if (data) habits = JSON.parse(data);
      } catch (e) {}
      render();
    }

    async function saveData() {
      await window.__widgetBridge.invoke('widget_write_file', { 
        filename, content: JSON.stringify(habits) 
      });
    }

    function toggleDot(index) {
      habits[index] = !habits[index];
      saveData();
      render();
    }

    function render() {
      grid.innerHTML = '';
      for (let i = 0; i < TOTAL_DAYS; i++) {
        const div = document.createElement('div');
        div.className = 'dot' + (habits[i] ? ' active' : '');
        div.addEventListener('click', () => toggleDot(i));
        grid.appendChild(div);
      }
    }

    loadData();
  </script>
</body>
</html>
