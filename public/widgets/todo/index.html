<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo Note</title>
  <script src="/widget-sdk.js"></script>
  <style>
    body {
      margin: 0; padding: 0; height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      color: rgba(255,255,255,0.9);
      background: rgba(0, 0, 0, 0.15); /* 统一的毛玻璃半透明底色 */
      -webkit-font-smoothing: antialiased;
    }
    .header {
      padding: 12px 16px 8px 16px;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .status {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      transition: opacity 0.3s;
    }
    .textarea-container {
      flex-grow: 1;
      padding: 12px 16px;
    }
    textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.95);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.6;
      resize: none;
      outline: none;
    }
    textarea::placeholder {
      color: rgba(255,255,255,0.3);
    }
    /* 自定义滚动条 */
    textarea::-webkit-scrollbar { width: 4px; }
    textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <span>NOTES</span>
    <span class="status" id="status-indicator"></span>
  </div>
  <div class="textarea-container">
    <textarea id="note-input" placeholder="写点什么... (自动保存)" spellcheck="false"></textarea>
  </div>

  <script>
    const textarea = document.getElementById('note-input');
    const status = document.getElementById('status-indicator');
    const urlParams = new URLSearchParams(window.location.search);
    const instanceId = urlParams.get('instanceId') || 'todo_default';
    const filename = `${instanceId}.txt`;
    let saveTimeout = null;

    // 从 Rust 后端读取持久化文件
    async function loadContent() {
      try {
        const content = await window.__widgetBridge.invoke('widget_read_file', { filename });
        textarea.value = content || '';
      } catch (e) {
        console.warn('Load failed (might be first run):', e);
      }
    }

    // 通过 Rust 后端写入持久化文件
    async function saveContent() {
      status.innerText = 'Saving...';
      try {
        await window.__widgetBridge.invoke('widget_write_file', { 
          filename, 
          content: textarea.value 
        });
        status.innerText = 'Saved';
        setTimeout(() => { if(status.innerText === 'Saved') status.innerText = ''; }, 2000);
      } catch (e) {
        status.innerText = 'Error';
        console.error(e);
      }
    }

    // 防抖自动保存（输入停止后 1 秒保存）
    textarea.addEventListener('input', () => {
      status.innerText = 'Typing...';
      if (saveTimeout) clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveContent, 1000);
    });

    // 失去焦点时立即保存
    textarea.addEventListener('blur', () => {
      if (saveTimeout) clearTimeout(saveTimeout);
      saveContent();
    });

    // 初始化加载
    loadContent();
  </script>
</body>
</html>
