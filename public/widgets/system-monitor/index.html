<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>System Monitor</title>
  <script src="/widget-sdk.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: transparent;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 4px;
      flex-shrink: 0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .title { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8); }
    .btn-settings {
      cursor: pointer; color: rgba(255,255,255,0.4); font-size: 14px;
      transition: color 0.2s; background: none; border: none; padding: 2px;
    }
    .btn-settings:hover { color: #fff; }

    /* Main content */
    .content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .content.hidden { display: none; }

    /* Config panel */
    .config-panel { display: none; flex-direction: column; gap: 10px; padding: 8px 12px; flex: 1; overflow-y: auto; }
    .config-panel.active { display: flex; }
    .config-title { font-size: 12px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
    .config-section { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .config-row {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 8px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; transition: all 0.15s;
    }
    .config-row:hover { background: rgba(255,255,255,0.08); }
    .config-row input[type="checkbox"] { accent-color: #3b82f6; width: 14px; height: 14px; }
    .config-row .dim-icon { font-size: 16px; }
    .config-row .dim-label { font-size: 12px; color: rgba(255,255,255,0.8); flex: 1; }
    .btn-close-config {
      background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.6);
      padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
    }
    .btn-close-config:hover { background: rgba(255,255,255,0.2); color: #fff; }

    /* Gauges */
    .gauges {
      display: flex; justify-content: space-around; align-items: center;
      padding: 4px 8px; flex-shrink: 0;
    }
    .gauge-container {
      position: relative; width: 80px; height: 80px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    .gauge { width: 100%; height: 100%; transform: rotate(-90deg); }
    .bg, .fill { fill: none; stroke-width: 7; }
    .bg { stroke: rgba(255,255,255,0.1); }
    .fill { stroke-linecap: round; stroke-dasharray: 201; stroke-dashoffset: 201; transition: stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .cpu-fill { stroke: url(#cpuGrad); }
    .mem-fill { stroke: url(#memGrad); }
    .swap-fill { stroke: url(#swapGrad); }
    .temp-fill { stroke: url(#tempGrad); }
    .gauge-info {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    .gauge-val { font-size: 1rem; font-weight: 700; color: rgba(255,255,255,0.95); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .gauge-label { font-size: 0.6rem; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1px; text-transform: uppercase; }

    /* Network */
    .network-bar {
      display: flex; justify-content: center; gap: 16px;
      padding: 2px 12px; flex-shrink: 0;
    }
    .net-item { display: flex; align-items: center; gap: 4px; }
    .net-dot { width: 5px; height: 5px; border-radius: 50%; }
    .net-dot.down { background: #60a5fa; }
    .net-dot.up { background: #34d399; }
    .net-val { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.7); }

    /* Top processes */
    .top-section { flex: 1; overflow-y: auto; padding: 0 8px 6px; min-height: 0; }
    .top-section::-webkit-scrollbar { width: 3px; }
    .top-section::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .proc-row {
      display: flex; align-items: center; padding: 3px 6px; border-radius: 5px;
      gap: 6px; transition: background 0.1s; font-size: 11px;
    }
    .proc-row:hover { background: rgba(255,255,255,0.06); }
    .proc-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: rgba(255,255,255,0.8); }
    .proc-pid { color: rgba(255,255,255,0.3); font-size: 10px; min-width: 32px; text-align: right; }
    .proc-cpu { min-width: 40px; text-align: right; font-weight: 600; font-variant-numeric: tabular-nums; }
    .proc-mem { min-width: 36px; text-align: right; color: rgba(255,255,255,0.4); font-size: 10px; }
    .proc-bar { width: 30px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
    .proc-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    .kill-btn {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.2);
      color: #ef4444; padding: 1px 5px; border-radius: 3px; cursor: pointer;
      font-size: 9px; font-weight: 600; opacity: 0; transition: opacity 0.15s;
    }
    .proc-row:hover .kill-btn { opacity: 1; }
    .kill-btn:hover { background: rgba(239,68,68,0.3); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="title">📊 系统监控</span>
    </div>
    <button class="btn-settings" onclick="toggleConfig()">⚙️</button>
  </div>

  <div class="config-panel" id="config-panel">
    <div class="config-title">
      <span>监控配置</span>
      <button class="btn-close-config" onclick="toggleConfig()">关闭</button>
    </div>
    <div class="config-section">显示模块</div>
    <label class="config-row">
      <input type="checkbox" id="cfg-cpu" onchange="saveMonitorConfig()">
      <span class="dim-icon">🔥</span>
      <span class="dim-label">CPU 使用率</span>
    </label>
    <label class="config-row">
      <input type="checkbox" id="cfg-ram" onchange="saveMonitorConfig()">
      <span class="dim-icon">💾</span>
      <span class="dim-label">内存使用率</span>
    </label>
    <label class="config-row">
      <input type="checkbox" id="cfg-swap" onchange="saveMonitorConfig()">
      <span class="dim-icon">🔄</span>
      <span class="dim-label">Swap 占用</span>
    </label>
    <label class="config-row">
      <input type="checkbox" id="cfg-temp" onchange="saveMonitorConfig()">
      <span class="dim-icon">🌡️</span>
      <span class="dim-label">CPU 温度</span>
    </label>
    <label class="config-row">
      <input type="checkbox" id="cfg-network" onchange="saveMonitorConfig()">
      <span class="dim-icon">🌐</span>
      <span class="dim-label">网络速率</span>
    </label>
    <label class="config-row">
      <input type="checkbox" id="cfg-top" onchange="saveMonitorConfig()">
      <span class="dim-icon">📋</span>
      <span class="dim-label">Top 进程列表</span>
    </label>
    <div class="config-section" style="margin-top:8px;">刷新频率</div>
    <div style="display:flex;gap:6px;">
      <button class="btn-close-config" onclick="setRefreshRate(1)" id="rate-1">1秒</button>
      <button class="btn-close-config" onclick="setRefreshRate(2)" id="rate-2">2秒</button>
      <button class="btn-close-config" onclick="setRefreshRate(5)" id="rate-5">5秒</button>
    </div>
  </div>

  <div class="content" id="main-content">
    <!-- CPU & RAM Gauges -->
    <div class="gauges" id="gauges-section">
      <div class="gauge-container">
        <svg viewBox="0 0 80 80" class="gauge">
          <defs><linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#10b981"/></linearGradient></defs>
          <circle class="bg" cx="40" cy="40" r="32"/><circle class="fill cpu-fill" cx="40" cy="40" r="32" id="cpu-ring"/>
        </svg>
        <div class="gauge-info"><span class="gauge-val" id="cpu-text">--%</span><span class="gauge-label">CPU</span></div>
      </div>
      <div class="gauge-container">
        <svg viewBox="0 0 80 80" class="gauge">
          <defs><linearGradient id="memGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#3b82f6"/></linearGradient></defs>
          <circle class="bg" cx="40" cy="40" r="32"/><circle class="fill mem-fill" cx="40" cy="40" r="32" id="mem-ring"/>
        </svg>
        <div class="gauge-info"><span class="gauge-val" id="mem-text">--%</span><span class="gauge-label">RAM</span></div>
      </div>
      <div class="gauge-container">
        <svg viewBox="0 0 80 80" class="gauge">
          <defs><linearGradient id="swapGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>
          <circle class="bg" cx="40" cy="40" r="32"/><circle class="fill swap-fill" cx="40" cy="40" r="32" id="swap-ring"/>
        </svg>
        <div class="gauge-info"><span class="gauge-val" id="swap-text">--%</span><span class="gauge-label">SWAP</span></div>
      </div>
      <div class="gauge-container">
        <svg viewBox="0 0 80 80" class="gauge">
          <defs><linearGradient id="tempGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#ef4444"/></linearGradient></defs>
          <circle class="bg" cx="40" cy="40" r="32"/><circle class="fill temp-fill" cx="40" cy="40" r="32" id="temp-ring"/>
        </svg>
        <div class="gauge-info"><span class="gauge-val" id="temp-text">--°</span><span class="gauge-label">TEMP</span></div>
      </div>
    </div>

    <!-- Network Speed -->
    <div class="network-bar" id="network-section" style="display:none;">
      <div class="net-item"><span class="net-dot down"></span><span class="net-val" id="net-down">0 B/s</span></div>
      <div class="net-item"><span class="net-dot up"></span><span class="net-val" id="net-up">0 B/s</span></div>
    </div>

    <!-- Top Processes -->
    <div class="top-section" id="top-section" style="display:none;"></div>
  </div>

  <script>
    const CIRC = 201; // 2 * PI * 32
    const urlParams = new URLSearchParams(window.location.search);
    const instanceId = urlParams.get('instanceId') || 'sys_default';
    const configFilename = `monitor_${instanceId}_config.json`;

    // Default config
    let monitorConfig = { showCpu: true, showRam: true, showSwap: false, showTemp: false, showNetwork: false, showTop: false, refreshRate: 2 };

    function setRing(id, pct) {
      const el = document.getElementById(id);
      if (el) el.style.strokeDashoffset = CIRC - (pct / 100) * CIRC;
    }

    function fmtSpeed(b) {
      if (b >= 1048576) return (b / 1048576).toFixed(1) + ' MB/s';
      if (b >= 1024) return (b / 1024).toFixed(1) + ' KB/s';
      return b.toFixed(0) + ' B/s';
    }

    function fmtMem(bytes) {
      if (bytes >= 1073741824) return (bytes / 1073741824).toFixed(1) + 'G';
      if (bytes >= 1048576) return (bytes / 1048576).toFixed(0) + 'M';
      return (bytes / 1024).toFixed(0) + 'K';
    }

    function cpuColor(c) {
      if (c > 80) return '#ef4444';
      if (c > 50) return '#f59e0b';
      if (c > 20) return '#10b981';
      return '#60a5fa';
    }

    function applyVisibility() {
      const showAnyGauge = monitorConfig.showCpu || monitorConfig.showRam || monitorConfig.showSwap || monitorConfig.showTemp;
      document.getElementById('gauges-section').style.display = showAnyGauge ? 'flex' : 'none';
      document.getElementById('network-section').style.display = monitorConfig.showNetwork ? 'flex' : 'none';
      document.getElementById('top-section').style.display = monitorConfig.showTop ? 'block' : 'none';
      // Hide individual gauges (order: cpu, ram, swap, temp)
      const gauges = document.querySelectorAll('.gauge-container');
      if (gauges[0]) gauges[0].style.display = monitorConfig.showCpu ? 'flex' : 'none';
      if (gauges[1]) gauges[1].style.display = monitorConfig.showRam ? 'flex' : 'none';
      if (gauges[2]) gauges[2].style.display = monitorConfig.showSwap ? 'flex' : 'none';
      if (gauges[3]) gauges[3].style.display = monitorConfig.showTemp ? 'flex' : 'none';
    }

    function applyConfigToUI() {
      document.getElementById('cfg-cpu').checked = monitorConfig.showCpu;
      document.getElementById('cfg-ram').checked = monitorConfig.showRam;
      document.getElementById('cfg-swap').checked = monitorConfig.showSwap;
      document.getElementById('cfg-temp').checked = monitorConfig.showTemp;
      document.getElementById('cfg-network').checked = monitorConfig.showNetwork;
      document.getElementById('cfg-top').checked = monitorConfig.showTop;
      [1,2,5].forEach(r => {
        const btn = document.getElementById('rate-' + r);
        if (btn) btn.style.background = r === monitorConfig.refreshRate ? 'rgba(59,130,246,0.5)' : '';
      });
      applyVisibility();
    }

    async function loadMonitorConfig() {
      try {
        const data = await window.__widgetBridge.invoke('widget_read_file', { filename: configFilename });
        if (data) {
          const cfg = JSON.parse(data);
          monitorConfig = { ...monitorConfig, ...cfg };
        }
      } catch (e) {}
      applyConfigToUI();
    }

    async function saveMonitorConfig() {
      monitorConfig.showCpu = document.getElementById('cfg-cpu').checked;
      monitorConfig.showRam = document.getElementById('cfg-ram').checked;
      monitorConfig.showSwap = document.getElementById('cfg-swap').checked;
      monitorConfig.showTemp = document.getElementById('cfg-temp').checked;
      monitorConfig.showNetwork = document.getElementById('cfg-network').checked;
      monitorConfig.showTop = document.getElementById('cfg-top').checked;
      applyVisibility();
      await window.__widgetBridge.invoke('widget_write_file', { filename: configFilename, content: JSON.stringify(monitorConfig) });
    }

    function setRefreshRate(rate) {
      monitorConfig.refreshRate = rate;
      [1,2,5].forEach(r => {
        const btn = document.getElementById('rate-' + r);
        if (btn) btn.style.background = r === rate ? 'rgba(59,130,246,0.5)' : '';
      });
      window.__widgetBridge.invoke('widget_write_file', { filename: configFilename, content: JSON.stringify(monitorConfig) });
    }

    function toggleConfig() {
      const panel = document.getElementById('config-panel');
      const content = document.getElementById('main-content');
      if (panel.classList.contains('active')) {
        panel.classList.remove('active');
        content.classList.remove('hidden');
      } else {
        panel.classList.add('active');
        content.classList.add('hidden');
        applyConfigToUI();
      }
    }

    // Handle sysinfo updates
    window.__widgetBridge.on('sysinfo_update', (data) => {
      if (!data) return;
      if (monitorConfig.showCpu) {
        const cpu = Math.round(data.cpu_usage);
        document.getElementById('cpu-text').innerText = cpu + '%';
        setRing('cpu-ring', cpu);
      }
      if (monitorConfig.showRam) {
        const mem = Math.round(data.mem_usage);
        document.getElementById('mem-text').innerText = mem + '%';
        setRing('mem-ring', mem);
      }
      if (monitorConfig.showSwap) {
        const swap = Math.round(data.swap_usage || 0);
        document.getElementById('swap-text').innerText = swap + '%';
        setRing('swap-ring', swap);
      }
      if (monitorConfig.showTemp) {
        const temp = Math.round(data.cpu_temp || 0);
        document.getElementById('temp-text').innerText = temp + '°';
        // 温度映射到百分比：0°C=0%, 100°C=100%
        setRing('temp-ring', Math.min(100, temp));
      }
      if (monitorConfig.showNetwork && data.net_bytes_in !== undefined) {
        document.getElementById('net-down').innerText = fmtSpeed(data.net_bytes_in);
        document.getElementById('net-up').innerText = fmtSpeed(data.net_bytes_out);
      }
    });

    // Top processes — loaded on demand, not auto-refresh
    let topLoaded = false;
    async function loadTop() {
      if (!monitorConfig.showTop) return;
      try {
        const procs = await window.__widgetBridge.invoke('get_top_processes', {});
        const el = document.getElementById('top-section');
        if (!procs || procs.length === 0) {
          el.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:12px;">暂无数据</div>';
          return;
        }
        el.innerHTML = procs.map(p => `
          <div class="proc-row">
            <span class="proc-name" title="${p.name}">${p.name}</span>
            <span class="proc-pid">${p.pid}</span>
            <div class="proc-bar"><div class="proc-bar-fill" style="width:${Math.min(100,p.cpu_usage)}%;background:${cpuColor(p.cpu_usage)}"></div></div>
            <span class="proc-cpu" style="color:${cpuColor(p.cpu_usage)}">${p.cpu_usage.toFixed(1)}%</span>
            <span class="proc-mem">${fmtMem(p.mem_usage)}</span>
            <button class="kill-btn" onclick="doKill(${p.pid},'${p.name.replace(/'/g,"\\'")}')">Kill</button>
          </div>
        `).join('');
        topLoaded = true;
      } catch (e) {
        console.error('Failed to load processes:', e);
      }
    }

    async function doKill(pid, name) {
      if (!confirm(`确定要结束 ${name} (PID: ${pid}) 吗？`)) return;
      try {
        await window.__widgetBridge.invoke('kill_process', { pid });
        loadTop();
      } catch (e) {
        alert('结束进程失败: ' + e);
      }
    }

    // Periodically refresh top if visible
    setInterval(() => {
      if (monitorConfig.showTop) loadTop();
    }, 5000);

    // Init
    loadMonitorConfig().then(() => {
      if (monitorConfig.showTop) loadTop();
    });
  </script>
</body>
</html>
