<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather</title>
  <script src="/widget-sdk.js"></script>
  <style>
    body {
      margin: 0; padding: 16px; height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
      background: rgba(0, 0, 0, 0.15);
      color: rgba(255,255,255,0.9);
      display: flex; flex-direction: column; justify-content: space-between;
      -webkit-font-smoothing: antialiased;
    }
    .city { font-size: 0.8rem; font-weight: 600; letter-spacing: 1px; color: rgba(255,255,255,0.7); }
    .main { display: flex; align-items: center; justify-content: space-between; }
    .temp { font-size: 3.5rem; font-weight: 800; }
    .icon { font-size: 2.5rem; }
    .desc { font-size: 0.8rem; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="city">BEIJING</div>
  <div class="main">
    <div class="temp">24°</div>
    <div class="icon">⛅</div>
  </div>
  <div class="desc">多云转晴 · 微风</div>
</body>
</html>
