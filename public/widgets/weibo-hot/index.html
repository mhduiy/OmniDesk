<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>全网实时热搜</title>
  <script src="/widget-sdk.js"></script>
  <style>
    body {
      margin: 0; padding: 14px 18px; height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, rgba(20,25,35,0.4), rgba(40,50,65,0.4));
      color: rgba(255,255,255,0.9);
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    
    .header { 
      display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-shrink: 0; 
      font-size: 0.85rem; color: rgba(255,255,255,0.6);
    }
    .tab { cursor: pointer; transition: color 0.2s; }
    .tab.active {
      color: rgba(255,255,255,0.95);
      background: rgba(255,255,255,0.15);
      padding: 4px 10px;
      border-radius: 6px;
    }
    
    .hot-list { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex-grow: 1; padding-right: 4px; }
    .hot-list::-webkit-scrollbar { width: 4px; }
    .hot-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    
    .hot-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      background: rgba(255,255,255,0.03);
      padding: 10px 12px;
      border-radius: 8px;
    }
    .hot-item:hover { background: rgba(255,255,255,0.08); transform: translateX(2px); }
    
    .rank {
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      width: 16px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .rank-1 { color: #ef4444; font-weight: 600; }
    .rank-2 { color: #f97316; font-weight: 600; }
    .rank-3 { color: #f59e0b; font-weight: 600; }
    
    .content-box {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      min-width: 0;
      gap: 4px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }
    
    .title {
      font-weight: 400;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      letter-spacing: 0.3px;
    }
    
    .heat {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      font-weight: 400;
    }

    .summary {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .thumb {
      flex-shrink: 0;
      width: 60px;
      height: 45px;
      border-radius: 4px;
      object-fit: cover;
      background: rgba(0,0,0,0.2);
    }
    
    .status { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-align: center; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="header">
    <!-- 原微博热搜由于公司防火墙拦截严重，自动切换为完全无拦截的百度实时热搜 -->
    <span class="tab active">全网热点 (Baidu)</span>
    <span id="update-time" style="margin-left: auto; font-size: 0.7rem; font-family: monospace;">--:--</span>
  </div>
  
  <div class="hot-list" id="hot-list">
    <div class="status">拉取全网实时热点中...</div>
  </div>

  <script>
    function formatHeat(numStr) {
      const num = parseInt(numStr, 10);
      if (isNaN(num)) return numStr;
      if (num >= 10000) {
        return (num / 10000).toFixed(1) + '万';
      }
      return num.toString();
    }

    async function fetchHotSearch() {
      const listEl = document.getElementById('hot-list');
      try {
        const html = await window.__widgetBridge.invoke('fetch_proxy', { 
          url: 'https://top.baidu.com/board?tab=realtime',
          token: null
        });

        // 百度的数据注入在 <!--s-data: {...}--> 中
        const match = html.match(/<!--s-data:(.*?)-->/);
        if (!match || !match[1]) {
          throw new Error("无法解析热点数据");
        }

        const data = JSON.parse(match[1]);
        const cards = data.data.cards[0].content;
        
        if (!cards || cards.length === 0) {
          throw new Error("无数据");
        }

        listEl.innerHTML = '';
        
        const maxItems = Math.min(cards.length, 15);
        for (let i = 0; i < maxItems; i++) {
          const item = cards[i];
          
          const rank = i + 1;
          const title = item.query || item.word;
          const link = item.appUrl || item.rawUrl || item.url;
          const heatStr = item.hotScore ? formatHeat(item.hotScore) : '';
          const desc = item.desc || '';
          const img = item.img || '';

          const div = document.createElement('div');
          div.className = 'hot-item';
          if (link) {
            div.onclick = () => window.__widgetBridge.invoke('open_url', { url: link });
          }
          
          let rankClass = '';
          if (rank === 1) rankClass = 'rank-1';
          else if (rank === 2) rankClass = 'rank-2';
          else if (rank === 3) rankClass = 'rank-3';

          div.innerHTML = `
            <div class="rank ${rankClass}">${rank}</div>
            <div class="content-box">
              <div class="title-row">
                <div class="title">${title}</div>
                <div class="heat">${heatStr}</div>
              </div>
              ${desc ? `<div class="summary">${desc}</div>` : ''}
            </div>
            ${img ? `<img class="thumb" src="${img}" loading="lazy" />` : ''}
          `;

          listEl.appendChild(div);
        }

        const now = new Date();
        document.getElementById('update-time').innerText = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
      } catch (e) {
        listEl.innerHTML = `<div class="status" style="color:#ef4444;">加载失败: ${e.message}</div>`;
      }
    }

    fetchHotSearch();
    setInterval(fetchHotSearch, 15 * 60 * 1000);
  </script>
</body>
</html>
